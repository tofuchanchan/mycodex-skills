interface:
  display_name: "Figma Page Reviser"
  short_description: "Revise Figma pages with scoped edits, OST admin/user standards, component/table layer grouping, style parity, and artifact QA."
  default_prompt: "Revise this reproduced Figma page, only changing the requested areas while preserving semantic layer groups down to component/table structures, detecting whether it is OST后台/admin or OST商户端/user, applying ost-admin-system-guidelines or ost-user-system-guidelines as appropriate, grouping buttons, fields, file chips, table header/body/rows/cells, operation links, and repeated controls, matching similar modules, and checking text fit plus visual artifacts."
